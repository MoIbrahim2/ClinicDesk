version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: clinic_desk_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: clinic_desk
      MYSQL_USER: clinic_user
      MYSQL_PASSWORD: clinic_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - clinic_network

  backend:
    build:
      context: ./clinic-desk-backend
      dockerfile: Dockerfile
    container_name: clinic_desk_backend
    restart: always
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: clinic_user
      DB_PASSWORD: clinic_password
      DB_DATABASE: clinic_desk
      JWT_SECRET: supersecretkey
      JWT_EXPIRATION: 900
      JWT_REFRESH_EXPIRATION: 604800
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - clinic_network

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: clinic_desk_nginx
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - clinic_network

volumes:
  db_data:

networks:
  clinic_network:
    driver: bridge
